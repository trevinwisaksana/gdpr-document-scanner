steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -f
      - docker/Dockerfile.scanner
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gdpr-scanner-consumer:$COMMIT_SHA
      - .

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gdpr-scanner-consumer:$COMMIT_SHA

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - gdpr-scanner-consumer
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gdpr-scanner-consumer:$COMMIT_SHA
      - --region=us-central1
      - --no-allow-unauthenticated
      - --min-instances=20
      - --max-instances=20
      - --concurrency=100

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gdpr-scanner-consumer:$COMMIT_SHA
